services:
  # ── 1. Ollama ──────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - llm-weights:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - llm-net
    healthcheck:
      # Use /api/tags - this returns 200 OK if Ollama is up
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    environment:
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=1

  # Pull model (Wait for Ollama to be Healthy)
  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    networks:
      - llm-net
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: /bin/sh -c "ollama pull llama3:8b-instruct-q4_K_M"

  # ── 2. Ray Cluster (Head & Workers) ────────
  ray-head:
    build:
      context: .
      dockerfile: docker/Dockerfile.ray
    container_name: ray-head
    command: ray start --head --port=6379 --dashboard-host=0.0.0.0 --num-cpus=2 --block
    ports:
      - "6379:6379"
      - "8265:8265"
    networks:
      - llm-net
    healthcheck:
      test: ["CMD", "ray", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  ray-worker-1:
    build:
      context: .
      dockerfile: docker/Dockerfile.ray
    container_name: ray-worker-1
    command: ray start --address=ray-head:6379 --num-cpus=2 --block
    networks:
      - llm-net
    depends_on:
      ray-head:
        condition: service_healthy

  # ── 3. FastAPI Gateway ─────────────────────
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    container_name: gateway
    ports:
      - "8000:8000"
    networks:
      - llm-net
    depends_on:
      ray-head:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      - RAY_ADDRESS=ray://ray-head:10001
      - OLLAMA_HOST=http://ollama:11434

  # ── 4. Prometheus (Monitoring) ─────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - monitoring-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - llm-net

networks:
  llm-net:
    driver: bridge

volumes:
  llm-weights:
  monitoring-data: